services:
  - type: web
    name: pesa-ai-logger
    runtime: docker
    plan: free
    envVars:
      - key: PESA_DB_PATH
        value: /tmp/pesa_logger.db
      - key: PESA_API_KEY
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "true"
    healthCheckPath: /health
    autoDeploy: true
